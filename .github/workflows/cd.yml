name: Docker CD

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-image:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.prep.outputs.image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image name
        id: prep
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-vps:
    runs-on: ubuntu-latest
    needs: publish-image
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: docker-compose.yml
          target: ${{ secrets.VPS_APP_DIR }}

      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_IMAGE: ${{ needs.publish-image.outputs.image }}:latest
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          PORT: ${{ secrets.PORT }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: APP_IMAGE,VPS_APP_DIR,PORT,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -e
            mkdir -p "$VPS_APP_DIR"
            cd "$VPS_APP_DIR"

            cat > .env <<EOF
            PORT=$PORT
            APP_IMAGE=$APP_IMAGE
            EOF

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            APP_IMAGE="$APP_IMAGE" docker compose pull app
            APP_IMAGE="$APP_IMAGE" docker compose up -d --remove-orphans